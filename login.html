<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOKKAT 로그인</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body class="auth-page">
    <section class="auth-card">
        <h2>로그인 / 회원가입</h2>
        <p class="auth-desc">원하는 방식으로 한 번에 가입하고 바로 서비스를 이용해보세요.</p>

        <div class="auth-group">
            <p class="auth-label">일반 가입</p>
            <form id="normal-signup-form" class="auth-form">
                <input class="auth-input" id="phone-or-email" type="text" placeholder="핸드폰번호 또는 이메일" required>
                <input class="auth-input" id="password" type="password" placeholder="패스워드" required>
                <label class="auth-check">
                    <input type="checkbox" id="auto-login">
                    자동로그인
                </label>
                <div class="auth-actions">
                    <button type="submit" class="btn-primary">일반 회원가입</button>
                </div>
            </form>
            <div class="auth-divider">또는</div>
            <p class="auth-label">SNS 간편 가입</p>
            <div class="sns-group">
                <button class="sns-btn kakao sns-login" data-provider="카카오톡">카카오톡으로 가입</button>
                <button class="sns-btn naver sns-login" data-provider="네이버">네이버로 가입</button>
                <button class="sns-btn google sns-login" data-provider="구글">구글로 가입</button>
            </div>
        </div>

        <div class="auth-actions">
            <button id="logout-btn" class="logout-btn" type="button">로그아웃</button>
            <a href="index.html" class="btn-outline" style="display:block;text-align:center;">메인으로 돌아가기</a>
        </div>

        <p id="auth-status" class="auth-status">현재 로그인 상태가 없습니다.</p>
    </section>

    <script src="JavaScript.js"></script>
</body>
</html>
